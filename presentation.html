<h2 id="what-claude-code-actually-is">What Claude Code actually is</h2>
<p>An <strong>agentic coding CLI</strong>. Lives in your terminal, reads/edits files in your codebase, runs shell commands, completes multi-step tasks — not just autocomplete or chat.</p>
<p><strong>Landscape around it:</strong></p>
<ul>
<li><strong>GitHub Copilot</strong> — editor-native autocomplete; now has an agent mode too.</li>
<li><strong>Cursor / Windsurf</strong> — IDE-native agents. Editor is the home; multi-file chat + edits baked in.</li>
<li><strong>OpenAI Codex CLI</strong> — closest peer to Claude Code. Terminal-native agent, different model family.</li>
<li><strong>ChatGPT / Claude.ai (web)</strong> — chat only. No direct file or shell access to your repo.</li>
</ul>
<p><strong>Claude Code</strong> — terminal-native, deeply integrated with the Claude family, extensible via skills / subagents / hooks.</p>
</section>

<h2 id="why-this-matters-for-how-you-prompt-it">Why this matters for how you prompt it</h2>
<p>Because it has <strong>file + shell access</strong>, you can describe outcomes, not implementations:</p>
<ul>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Copilot-brain: <em>&quot;Write a function that...&quot;</em></li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Claude Code: <em>&quot;Add pagination to the user list endpoint. Check how other endpoints do it first.&quot;</em></li>
</ul>
<p>It'll <code>Read</code> similar files, follow your patterns, edit, and (if permitted) run tests.</p>
<p><strong>The rest of this talk:</strong> how to set it up so it does that <em>well</em>.</p>

<h2 id="authentication-options">Authentication options</h2>
<p><strong>Option 1 — <code>/login</code> (recommended)</strong><br />
Uses your Claude subscription (Pro / Max / Team). Zero extra config.</p>
<p><strong>Option 2 — API key (pay-per-token)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">export</span> ANTHROPIC_API_KEY=sk-ant-...
claude
</code></pre>
<p><strong>Which one?</strong> Pro / Max is flat-rate — great for steady daily use. API key makes sense for automation, team billing, or if you're already an Anthropic API customer.</p>

<h2 id="what-you-see-in-a-session">What you see in a session</h2>
<ul>
<li><strong>Input box</strong> at the bottom — type your prompt, <code>Enter</code> to send.</li>
<li><strong>Streaming output</strong> above — Claude's reasoning, tool calls, results.</li>
<li><strong>Shift+Tab</strong> — cycles permission/mode (default <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> plan <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> accept-edits).</li>
<li><strong>Esc</strong> — interrupts the current turn. Press twice = rewind (more in §3).</li>
<li><strong><code>/help</code></strong> — lists every slash command available.</li>
</ul>

<h2 id="starting-claude--the-flags-youll-actually-use">Starting Claude — the flags you'll actually use</h2>
<table>
<thead>
<tr>
<th>Flag</th>
<th>What it does</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>claude</code></td>
<td>Interactive TUI in current dir</td>
</tr>
<tr>
<td><code>claude -p &quot;task&quot;</code></td>
<td>Headless — one-shot, prints to stdout, exits</td>
</tr>
<tr>
<td><code>claude --continue</code> (<code>-c</code>)</td>
<td>Resume most recent session in this dir</td>
</tr>
<tr>
<td><code>claude --resume</code></td>
<td>Pick a session from recent history</td>
</tr>
<tr>
<td><code>claude --model &lt;name&gt;</code></td>
<td>Start with <code>opus</code> / <code>sonnet</code> / <code>haiku</code></td>
</tr>
<tr>
<td><code>claude --permission-mode &lt;mode&gt;</code></td>
<td>Start in <code>plan</code> / <code>acceptEdits</code> / <code>default</code></td>
</tr>
<tr>
<td><code>claude --add-dir &lt;path&gt;</code></td>
<td>Include another dir in working scope</td>
</tr>
<tr>
<td><code>claude --dangerously-skip-permissions</code></td>
<td>Bypass ALL prompts — sandbox only</td>
</tr>
<tr>
<td><code>claude --version</code></td>
<td>Print version</td>
</tr>
</tbody>
</table>

<h2 id="the-two-homes">The two homes</h2>
<p>Claude Code reads config from two places, merged at session start:</p>
<table>
<thead>
<tr>
<th>Location</th>
<th>Scope</th>
<th>Commit?</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>~/.claude/</code></td>
<td><strong>Global</strong> — applies to every project you run</td>
<td><strong>Yes</strong> — in a personal dotfiles repo</td>
</tr>
<tr>
<td><code>&lt;repo&gt;/.claude/</code></td>
<td><strong>Project</strong> — this repo only</td>
<td><strong>Yes</strong> — in the project repo</td>
</tr>
</tbody>
</table>
<p>Plus: <code>&lt;repo&gt;/.claude/settings.local.json</code> = your personal overrides for this project (gitignored).</p>
<p><strong>Committing <code>~/.claude/</code> is a superpower</strong> — restore your full Claude setup on any machine. But be deliberate about what you share vs. what stays local (next slide).</p>
</section>

<h2 id="sensible-gitignore-for-claude">Sensible gitignore for <code>~/.claude/</code></h2>
<p>Whitelist what you share; exclude state, logs, credentials:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-gitignore"># ~/.claude/.gitignore

# state + ephemeral — personal and large
projects/              # per-session history
todos/
statsig/
logs/
*.log

# credentials
.credentials.json
*.token

# caches
cache/
ide/
</code></pre>
<p><strong>Commit:</strong> <code>CLAUDE.md</code>, <code>settings.json</code>, <code>skills/</code>, <code>agents/</code>, <code>commands/</code>, <code>hooks/</code>, <code>keybindings.json</code>.<br />
<strong>Never commit:</strong> session history, todos, logs, credentials.</p>
</section>

<h2 id="inside-claude-global">Inside <code>~/.claude/</code> (global)</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>~/.claude/
├── CLAUDE.md           # instructions loaded into EVERY session
├── settings.json       # permissions, env, hooks, model prefs
├── commands/           # custom /slash-commands (personal)
├── skills/             # skills (personal)
├── agents/             # subagents (personal)
├── projects/           # per-project session history + memory
└── keybindings.json    # custom terminal keybinds
</code></pre>
<p>Think of it like <code>~/.ssh/</code> or <code>~/.gitconfig</code> — your personal Claude Code profile, richer.</p>
</section>

<h2 id="claudemd-hierarchy--precedence">CLAUDE.md hierarchy &amp; precedence</h2>
<p>Claude walks up from your working directory and loads every <code>CLAUDE.md</code> it finds. <strong>All concatenated</strong> — more specific wins by being loaded later.</p>
<table>
<thead>
<tr>
<th>Scope</th>
<th>Location</th>
<th>Who it's for</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>User</strong></td>
<td><code>~/.claude/CLAUDE.md</code></td>
<td>Your preferences, all projects</td>
</tr>
<tr>
<td><strong>Project</strong></td>
<td><code>./CLAUDE.md</code> or <code>./.claude/CLAUDE.md</code></td>
<td>Team, committed</td>
</tr>
<tr>
<td><strong>Subfolder</strong></td>
<td><code>&lt;repo&gt;/sub/CLAUDE.md</code></td>
<td>Loaded on-demand when Claude touches that dir</td>
</tr>
</tbody>
</table>
<p><strong>Why it matters:</strong> global <em>preferences</em> (your style) at user level. Project <em>facts</em> (stack, conventions) at project level. <em>Hyper-local rules</em> (one folder uses a different lint config) at subfolder level. Claude stitches them together for you.</p>
</section>

<h2 id="what-actually-gets-sent-to-the-model">What actually gets sent to the model</h2>
<p>On each turn, Claude Code assembles a prompt:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[ Claude Code system prompt (built-in) ]
+ [ Your global CLAUDE.md ]
+ [ Project CLAUDE.md ]
+ [ Relevant subfolder CLAUDE.md (if you're in/touching that folder) ]
+ [ Tool definitions: Read, Edit, Bash, Grep, Glob, ... ]
+ [ Conversation so far ]
+ [ Your latest message ]
</code></pre>
<p><strong>Your codebase is NOT sent.</strong> Files are read <strong>on demand</strong> via the <code>Read</code> tool. This is why Claude Code works on huge repos — it only pulls what it needs.</p>
</section>

<h2 id="path-imports-inside-claudemd"><code>@path</code> imports inside CLAUDE.md</h2>
<p>Pull in existing docs instead of rewriting them:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># Project notes</span>

Architecture: @docs/architecture.md
Style guide:  @.claude/STYLE.md
</code></pre>
<p>At session start, each <code>@path</code> is expanded inline — up to <strong>5 levels</strong> of recursive imports. Claude sees the referenced file's full contents.</p>
<p><strong>Why it matters:</strong> CLAUDE.md is a <em>table of contents</em>, not a re-documentation of your repo. Keep the file short; hoist the rest via <code>@path</code>.</p>
</section>

<h2 id="clauderules--modular-scoped-instructions"><code>.claude/rules/</code> — modular, scoped instructions</h2>
<p><strong>What it is:</strong> a directory of topic-specific markdown files that Claude loads alongside <code>CLAUDE.md</code>. Every <code>.md</code> is discovered recursively.</p>
<p><strong>When to use it:</strong></p>
<ul>
<li><code>CLAUDE.md</code> is growing past ~200 lines</li>
<li>Rules apply only to certain file types or directories (path-scoping)</li>
<li>You want to share rules across projects via symlinks</li>
<li>Different teammates care about different rulesets</li>
</ul>
<p><strong>How to organize:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>your-repo/
├── CLAUDE.md                 # the essentials: stack, workflows, top guardrails
└── .claude/rules/
    ├── code-style.md         # how code should look
    ├── testing.md            # how to test, what's required
    ├── api-conventions.md    # API rules (can be path-scoped)
    └── security.md           # security requirements
</code></pre>
<p><strong>Tips:</strong></p>
<ul>
<li>Rules without <code>paths:</code> frontmatter load every session — same weight as CLAUDE.md.</li>
<li>Rules <em>with</em> a <code>paths:</code> frontmatter load only when Claude touches matching files — monorepos save tons of context this way.</li>
<li><code>~/.claude/rules/</code> for personal rules across <em>every</em> project.</li>
<li>Symlink a shared rules dir from multiple repos to avoid copy-paste drift.</li>
</ul>
</section>

<h2 id="settingsjson-precedence"><code>settings.json</code> precedence</h2>
<p>Same three-layer idea, different merge:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>~/.claude/settings.json              ← user defaults
&lt;repo&gt;/.claude/settings.json         ← team settings (committed)
&lt;repo&gt;/.claude/settings.local.json   ← your personal overrides (gitignored)
</code></pre>
<p><strong>Merge rule:</strong> later layer wins for the same key. Permissions arrays (<code>allow</code>/<code>deny</code>/<code>ask</code>) are <strong>unioned</strong> — deny from any layer wins.</p>

<h2 id="auto-memory--claude-writes-its-own-notes">Auto memory — Claude writes its own notes</h2>
<p>On by default. Claude captures learnings (your corrections, preferences, build quirks) into a memory directory <strong>nested per project</strong> (not at <code>~/.claude/</code> root):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>~/.claude/projects/&lt;project-slug&gt;/memory/
├── MEMORY.md              # concise index — loaded every session
├── debugging.md           # on-demand topic file
└── api-conventions.md     # on-demand topic file
</code></pre>
<ul>
<li><code>&lt;project-slug&gt;</code> is the absolute project path with <code>/</code> → <code>-</code>. E.g. <code>~/Downloads</code> becomes <code>-Users-you-Downloads</code>.</li>
<li><strong><code>MEMORY.md</code></strong> loads at session start — first <strong>200 lines</strong> or <strong>25KB</strong>, whichever comes first.</li>
<li><strong>Topic files</strong> are pulled on demand — no context cost until Claude actually needs them.</li>
<li>Keyed by git repo → all worktrees of the same repo share one memory dir.</li>
<li><strong>Machine-local.</strong> Not synced across machines or CI.</li>
</ul>
<p>Turn off with <code>CLAUDE_CODE_DISABLE_AUTO_MEMORY=1</code> or <code>{&quot;autoMemoryEnabled&quot;: false}</code> in settings.</p>
</section>

<h2 id="managing-memory-actively">Managing memory actively</h2>
<p><strong>When to reach for what:</strong></p>
<table>
<thead>
<tr>
<th>Want to...</th>
<th>Use</th>
</tr>
</thead>
<tbody>
<tr>
<td>Give Claude a <em>rule</em> you'll enforce</td>
<td>Write it into <code>CLAUDE.md</code></td>
</tr>
<tr>
<td>Scope a rule to specific files</td>
<td>A path-scoped rule in <code>.claude/rules/</code></td>
</tr>
<tr>
<td>Let Claude remember <em>without</em> you writing</td>
<td>Auto memory (on by default)</td>
</tr>
<tr>
<td>Pull in an existing doc as context</td>
<td><code>@path</code> import</td>
</tr>
<tr>
<td>Review/edit what's loaded this session</td>
<td><code>/memory</code></td>
</tr>
<tr>
<td>Compress a long session</td>
<td><code>/compact</code></td>
</tr>
<tr>
<td>Wipe this session, keep CLAUDE.md</td>
<td><code>/clear</code></td>
</tr>
</tbody>
</table>
<p><strong>Rules of thumb:</strong></p>
<ul>
<li>CLAUDE.md under <strong>200 lines</strong> — split into rules or imports beyond that.</li>
<li>Run <code>/memory</code> periodically to audit what Claude has learned about you.</li>
<li>If <code>/compact</code> is losing key instructions, move them into CLAUDE.md instead of re-typing.</li>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section"># Project: <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">your-project</span>&gt;</span></span></span>

<span class="hljs-section">## Context</span>
<span class="hljs-bullet">-</span> What this project does, in one paragraph.
<span class="hljs-bullet">-</span> Who the users are and the primary flow.
<span class="hljs-bullet">-</span> Any non-obvious architectural decisions.

<span class="hljs-section">## Conventions</span>
<span class="hljs-bullet">-</span> How tests are organized and how to run them.
<span class="hljs-bullet">-</span> Naming / style rules your team actually enforces.
<span class="hljs-bullet">-</span> What &quot;done&quot; looks like for a change in this repo.

<span class="hljs-section">## Guardrails</span>
<span class="hljs-bullet">-</span> Directories NOT to modify (legacy, generated, third-party).

<span class="hljs-bullet">-</span> Destructive operations that require human approval first.
</code></pre>

<h2 id="running-modes-vs-permission-modes">Running modes vs permission modes</h2>
<p>Two distinct axes:</p>
<p><strong>Running mode</strong> — <em>how</em> you invoke Claude:</p>
<ul>
<li><strong>Interactive</strong> — <code>claude</code> launches the TUI.</li>
<li><strong>Headless</strong> — <code>claude -p &quot;task&quot;</code> runs once, prints output, exits.</li>
</ul>
<p><strong>Permission mode</strong> — <em>what</em> Claude is allowed to do without asking:</p>
<ul>
<li><strong>Normal</strong> (default) — asks before every tool call.</li>
<li><strong>Auto-accept edits</strong> — approves <code>Read</code> / <code>Edit</code> / <code>Write</code>; still asks for <code>Bash</code> etc.</li>
<li><strong>Plan</strong> — read-only; plans but doesn't edit or run state-changing commands.</li>
<li><strong>Bypass permissions</strong> — skips every prompt. Sandbox only. (CLI flag; not in the cycle.)</li>
</ul>
<p>Cycle <strong>Normal → Auto-accept edits → Plan</strong> with <code>Shift+Tab</code> inside an interactive session. Details on each below.</p>
</section>

<h2 id="plan-mode">Plan mode</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># cycle to plan mode with Shift+Tab, then:</span>
&gt; Refactor the auth middleware to use JWT instead of session cookies.
</code></pre>
<p>Claude:</p>
<ol>
<li>Reads the relevant files (auth.js, routes, tests)</li>
<li>Produces a written plan — files to touch, order, risks</li>
<li><strong>Does not edit</strong> until you approve</li>
</ol>
<p><strong>Why it matters:</strong> plan mode is your dry-run. Non-trivial changes should start here — catches misunderstandings before Claude writes 200 lines in the wrong place.</p>
<p><strong><img class="emoji" draggable="false" alt="▶" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/25b6.svg" data-marp-twemoji=""/> DEMO</strong> · In <code>lab-app/</code>, <code>Shift+Tab</code> to plan, then: <em>&quot;Add a 'Session agenda' section to <code>index.html</code> between Audience and Prereqs — 6 rows (time · topic) matching the slide-deck agenda. Use the existing <code>&lt;section&gt;</code> + <code>&lt;h2&gt;</code> pattern and the coral palette.&quot;</em> Watch the plan appear — cross-reading CLAUDE.md + <code>styles.css</code> — before a line is written.</p>
</section>

<h2 id="headless-mode">Headless mode</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">claude -p <span class="hljs-string">&quot;list every TODO comment in src/ with file:line&quot;</span>
claude -p <span class="hljs-string">&quot;summarize the last 10 commits&quot;</span> &gt; release-notes.md
claude -p <span class="hljs-string">&quot;does this repo have a CI config? which CI?&quot;</span> | grep -i <span class="hljs-built_in">yes</span>
</code></pre>
<p><strong>Use cases:</strong></p>
<ul>
<li>Scripts and automation · CI pipelines · piping into Unix tools (<code>| jq</code>, <code>| grep</code>)</li>
<li><strong>Scheduled / remote execution</strong> — cron jobs, remote triggers, Slack/GitHub webhooks firing Claude</li>
</ul>
<p><strong>Why it matters:</strong> headless is the foundation for <strong>remote control</strong> — running Claude without a human at the terminal. <em>Remote agents and scheduling could fill their own meetup — scope for next time.</em></p>
<p><strong><img class="emoji" draggable="false" alt="▶" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/25b6.svg" data-marp-twemoji=""/> DEMO</strong> · In a second terminal: <code>claude -p &quot;list every section heading in lab-app/index.html&quot;</code>. No TUI, just stdout. Then pipe it: <code>... | wc -l</code>.</p>

<h2 id="session-control--resume-rewind-fork">Session control — resume, rewind, fork</h2>
<p>Three ways to navigate a conversation. Pick the right one:</p>
<table>
<thead>
<tr>
<th>Problem</th>
<th>Tool</th>
</tr>
</thead>
<tbody>
<tr>
<td>Closed the terminal; want to pick up where you left off</td>
<td><strong>Resume</strong> — <code>claude --continue</code> (last session) or <code>claude --resume</code> (picker)</td>
</tr>
<tr>
<td>Wrong last turn; want to retry from a checkpoint</td>
<td><strong>Rewind</strong> — <code>Esc</code>-<code>Esc</code> inside the session, pick a turn</td>
</tr>
<tr>
<td>Want to explore an alternative path without losing this one</td>
<td><strong>Fork</strong> — new worktree + fresh <code>claude</code> session; original stays alive</td>
</tr>
</tbody>
</table>
<p><strong>Why this matters:</strong> conversations are cheap; discarding context is expensive. When Claude heads wrong, rewind and re-prompt. When you want to explore two paths, fork. Don't just <code>/clear</code>.</p>
</section>

<h2 id="context-management">Context management</h2>
<p>Long sessions fill the context window. Two tools:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>/compact       # summarizes older turns, keeps recent ones intact
/clear         # wipes conversation, keeps CLAUDE.md
</code></pre>
<p><strong>Rules of thumb:</strong></p>
<ul>
<li><code>/compact</code> when the response starts feeling slow or forgetful</li>
<li><code>/clear</code> when you switch tasks entirely</li>
<li>Starting fresh beats fighting a stale context</li>
</ul>
<p><strong>Why it matters:</strong> the model weighs <em>all</em> in-context tokens. A 50-turn conversation about three unrelated things confuses it. Compact or clear deliberately.</p>
</section>

<h2 id="worktrees--what-they-actually-are">Worktrees — what they actually are</h2>
<p>A <strong>separate working directory</strong> attached to the same <code>.git</code> repo, with its own branch checked out — <em>not</em> just another branch.</p>
<table>
<thead>
<tr>
<th>Normal branch switch</th>
<th>Worktree</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>git checkout</code> modifies your <em>current</em> dir</td>
<td><code>git worktree add</code> creates a <em>new</em> dir</td>
</tr>
<tr>
<td>One branch &quot;live&quot; at a time</td>
<td>Multiple branches live in parallel</td>
</tr>
<tr>
<td>One working tree</td>
<td>Independent trees, shared <code>.git</code></td>
</tr>
</tbody>
</table>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git worktree add ../feat-auth feature/auth   <span class="hljs-comment"># create</span>
git worktree list                            <span class="hljs-comment"># list them</span>
git worktree remove ../feat-auth             <span class="hljs-comment"># delete</span>
</code></pre>
</section>

<h2 id="worktrees--the-simple-version">Worktrees — the simple version</h2>
<p><strong>A git repo stores many versions of your project (branches).</strong><br />
Normally, your project folder only shows <strong>one branch at a time</strong> — switching branches swaps which files you see.</p>
<p><strong>A worktree is an extra folder showing a <em>different</em> branch</strong> — so multiple branches are &quot;visible&quot; on your computer at the same time.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>WITHOUT WORKTREES                  WITH WORKTREES
─────────────────                  ───────────────────────────────────

  ~/myrepo/                          ~/myrepo/         ← showing: main
     └─ files for ONE                ~/feat-auth/      ← showing: feat/auth
        branch at a time             ~/feat-billing/   ← showing: feat/bill

  Want another branch?               All three folders exist at once.
  `git checkout` — the               `cd` between them to switch context.
  files in your folder               Each has its own files, its own branch,
  get swapped out.                   its own Claude session running.
</code></pre>
<p><strong>The whole point:</strong> edit three branches in parallel, run Claude in each, no file collisions.</p>
</section>

<h2 id="why-worktrees--claude-is-a-superpower">Why worktrees + Claude is a superpower</h2>
<p>Claude Code stores session state <strong>per directory</strong> (<code>~/.claude/projects/&lt;path-slug&gt;</code>). Different worktrees → automatically different, isolated Claude sessions.</p>
<p><strong>What this unlocks:</strong></p>
<ul>
<li><strong>True parallel Claude</strong> — two sessions, two worktrees, zero file collisions</li>
<li><strong>Per-worktree permission modes</strong> — one on bypass, one on normal; no cross-contamination</li>
<li><strong>Safe sandbox</strong> — let Claude go wild in a throwaway worktree; <code>git worktree remove</code> wipes the blast radius</li>
<li><strong>Forking a conversation</strong> — stuck? Branch off a worktree, try another path, keep the original alive</li>
</ul>
<p><strong>Merge-back is just regular git:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ../feat-auth &amp;&amp; git push                <span class="hljs-comment"># from the feature worktree</span>
<span class="hljs-built_in">cd</span> ../main-repo &amp;&amp; git merge feature/auth  <span class="hljs-comment"># or open a PR</span>
git worktree remove ../feat-auth           <span class="hljs-comment"># clean up</span>
</code></pre>
</section>

<h2 id="the-ultrathink-keyword">The <code>ultrathink</code> keyword</h2>
<p>Drop these keywords into any prompt to expand the reasoning budget:</p>
<table>
<thead>
<tr>
<th>Keyword</th>
<th>Relative effort</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>think</code></td>
<td>small bump</td>
</tr>
<tr>
<td><code>think hard</code></td>
<td>larger</td>
</tr>
<tr>
<td><code>think harder</code> / <code>megathink</code></td>
<td>larger still</td>
</tr>
<tr>
<td><strong><code>ultrathink</code></strong></td>
<td>maximum</td>
</tr>
</tbody>
</table>
<p>Example:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>ultrathink — our webhook deliveries are dropping ~2% at peak load.
Here's the queue code [@src/queue.ts]. What's the most likely root cause?
</code></pre>
<p><strong>Why it matters:</strong> for debugging, architecture, or subtle correctness questions, extra reasoning pays for itself. Don't use reflexively — it costs tokens.</p>

<h2 id="permission-modes--the-full-table">Permission modes — the full table</h2>
<p>The UI label (what you see in Claude) and the config name (what you write in <code>settings.json</code> / <code>--permission-mode</code>) are different. Both exist:</p>
<table>
<thead>
<tr>
<th>UI label</th>
<th>Config name</th>
<th>Behavior</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Normal</strong></td>
<td><code>default</code></td>
<td>Ask before each tool call</td>
</tr>
<tr>
<td><strong>Auto-accept edits</strong></td>
<td><code>acceptEdits</code></td>
<td>Auto-approve <code>Read</code> / <code>Edit</code> / <code>Write</code>; still ask for <code>Bash</code> etc.</td>
</tr>
<tr>
<td><strong>Plan</strong></td>
<td><code>plan</code></td>
<td>Read-only — plans but doesn't edit or run state-changing commands</td>
</tr>
<tr>
<td><strong>Bypass permissions</strong></td>
<td><code>bypassPermissions</code></td>
<td>Skip <em>every</em> prompt — sandbox only</td>
</tr>
</tbody>
</table>
<p><code>Shift+Tab</code> cycles the first three. Bypass is only via the flag: <code>--dangerously-skip-permissions</code>. Auto-accept applies <em>inside</em> turns — you submit a prompt, Claude's edits land without asking.</p>
</section>

<h2 id="configuring-permissions-in-settingsjson">Configuring permissions in <code>settings.json</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;permissions&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;allow&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;Read&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Edit&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Bash(npm test:*)&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Bash(git status:*)&quot;</span><span class="hljs-punctuation">]</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;deny&quot;</span><span class="hljs-punctuation">:</span>  <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;Bash(rm -rf*)&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Bash(curl:*)&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Bash(sudo:*)&quot;</span><span class="hljs-punctuation">]</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;ask&quot;</span><span class="hljs-punctuation">:</span>   <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;Bash(git commit:*)&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Bash(git push:*)&quot;</span><span class="hljs-punctuation">]</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<p><strong>Precedence:</strong> <code>deny</code> &gt; <code>ask</code> &gt; <code>allow</code>. Glob matching on the tool arg (<code>:*</code> matches any args).</p>
<p><strong>Easiest way to write this:</strong> have Claude do it for you.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Review my shell history + this repo's stack. Draft a `.claude/settings.json`
permissions block that: allows routine dev commands, denies destructive ones,
asks before state-changing git. Explain each line.
</code></pre>
<p>See <code>cheatsheets/permissions.md</code> for a starter template.</p>

<h2 id="permission-patterns-that-work">Permission patterns that work</h2>
<ul>
<li><strong>Read-only by default, write with approval</strong> — allow <code>Read</code> / <code>Grep</code> / <code>Glob</code>; <code>ask</code> on <code>Edit</code> / <code>Write</code>.</li>
<li><strong>Pre-approve commands you run all day</strong> — add your project's actual test, build, and lint commands to <code>allow</code>. The right set is <strong>the exact commands your repo uses</strong>, not a generic list.</li>
<li><strong>Deny the dangerous primitives outright</strong> — <code>rm -rf</code>, <code>curl</code> / <code>wget</code> (exfiltration), <code>sudo</code>, <code>git push --force</code>, <code>git reset --hard</code>.</li>
<li><strong>Ask on state-changing git</strong> — <code>git commit</code>, <code>git push</code>, <code>git tag</code>. Cheap to approve; catches mistakes.</li>
</ul>
<p><strong>How to tune:</strong> run for a day, watch which prompts feel like friction, add those to <code>allow</code>. Watch which felt scary, add those to <code>ask</code> or <code>deny</code>.</p>
</section>

<h2 id="bypass-permissions----dangerously-skip-permissions">Bypass permissions — <code>--dangerously-skip-permissions</code></h2>
<p>Approves <strong>every</strong> tool call without asking. Fast, dangerous.</p>
<p><strong>Real risks:</strong> <code>rm -rf</code> · credential exfiltration via prompt injection (<code>curl</code> your <code>.env</code> to an attacker) · broken git state · production DB if creds are on the host.</p>
<p><strong>Where it's OK:</strong> throwaway worktree on a feature branch · fresh scratch repo with nothing of value · short loops where you diff every change.</p>
<p><strong>Where it's NOT:</strong> your dev laptop on <code>main</code> against a real project · CI with prod secrets · any shared environment.</p>
<p><strong>Honest default:</strong> don't reach for bypass unless you've thought through the blast radius. A tight <code>allow</code> / <code>deny</code> / <code>ask</code> config in <code>settings.json</code> is almost always the better answer.</p>
</section>

<h2 id="the-decision-matrix">The decision matrix</h2>
<table>
<thead>
<tr>
<th>You want...</th>
<th>Reach for</th>
</tr>
</thead>
<tbody>
<tr>
<td>A reusable prompt/procedure invoked on demand (<code>/my-thing</code>)</td>
<td><strong>Skill</strong></td>
</tr>
<tr>
<td>An isolated sub-Claude with focused tools &amp; context</td>
<td><strong>Subagent</strong></td>
</tr>
<tr>
<td>Automatic behavior on an event (pre/post tool use, session start)</td>
<td><strong>Hook</strong></td>
</tr>
</tbody>
</table>
<p><strong>Rule of thumb:</strong></p>
<ul>
<li>Skill = <em>you</em> trigger it, deterministic procedure</li>
<li>Subagent = <em>Claude</em> delegates to it, specialized work with its own context budget</li>
<li>Hook = <em>the system</em> runs it, no model involved</li>
</ul>
</section>

<h2 id="skill-anatomy">Skill anatomy</h2>
<p><code>~/.claude/skills/&lt;name&gt;/SKILL.md</code> — YAML frontmatter + markdown body:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">---
name: <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">slug</span>&gt;</span></span>              # becomes the /slash-command
description: <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">one</span> <span class="hljs-attr">line</span>&gt;</span></span>   # tells Claude when to use + user what it does
user-invocable: true      # appears in /slash menu
allowed-tools: <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">list</span>&gt;</span></span>     # tight tool budget (least privilege)
<span class="hljs-section">argument-hint: &quot;[args]&quot;   # placeholder shown to user
---</span>

<span class="hljs-section"># Skill title</span>

<span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">markdown</span> <span class="hljs-attr">body</span> = <span class="hljs-string">the</span> <span class="hljs-attr">system</span> <span class="hljs-attr">prompt</span> <span class="hljs-attr">appended</span> <span class="hljs-attr">when</span> <span class="hljs-attr">invoked</span>&gt;</span></span>

Write it as instructions to Claude: steps, rules, examples, constraints.
</code></pre>
<p>Invoke: <code>/&lt;name&gt;</code>. Also auto-suggested when the user's prompt matches <code>description</code>.</p>
<p><strong>We'll walk through a real one (<code>/tutor</code>) in §5.</strong></p>
</section>

<h2 id="subagent-anatomy">Subagent anatomy</h2>
<p><code>~/.claude/agents/&lt;name&gt;.md</code> — same frontmatter-plus-body shape as a skill, different dispatch:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">---
name: <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">slug</span>&gt;</span></span>              # the subagent identity
description: <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">one</span> <span class="hljs-attr">line</span>&gt;</span></span>   # when the parent Claude should delegate to this
<span class="hljs-section">tools: <span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">list</span>&gt;</span></span>             # tool budget — often tighter than main Claude
---</span>

<span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">system</span> <span class="hljs-attr">prompt</span> <span class="hljs-attr">for</span> <span class="hljs-attr">this</span> <span class="hljs-attr">subagent</span>&gt;</span></span>

Its role, what to do when invoked, what format to return.
</code></pre>
<p>Parent Claude delegates via the <code>Agent</code> tool. The subagent runs in its <strong>own context window</strong>; only its final summary comes back.</p>
<p><strong>Why it matters:</strong> keeps the main conversation lean. Heavy research, deep reviews, or isolated tasks run in a subagent — parent context stays focused.</p>
</section>

<h2 id="hook-anatomy">Hook anatomy</h2>
<p>Configured in <code>settings.json</code> — shell commands fired on events. No model involvement:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;hooks&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;&lt;EventName&gt;&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;matcher&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;&lt;tool-or-pattern&gt;&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;hooks&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-punctuation">{</span> <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;command&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;command&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;&lt;shell&gt;&quot;</span> <span class="hljs-punctuation">}</span><span class="hljs-punctuation">]</span>
    <span class="hljs-punctuation">}</span><span class="hljs-punctuation">]</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<p><strong>Events you can hook:</strong> <code>PreToolUse</code>, <code>PostToolUse</code>, <code>UserPromptSubmit</code>, <code>Stop</code>, <code>SubagentStop</code>, <code>SessionStart</code>.</p>
<p><strong>Why it matters:</strong> hooks are deterministic — &quot;every time X, do Y&quot;. Memory and preferences can be ignored by the model; hooks are system-executed.</p>
</section>

<h2 id="meet-tutor">Meet <code>/tutor</code></h2>
<p>A real, 285-line skill that turns debugging sessions and code reviews into deep learning moments.</p>
<p><strong>What makes it a good teaching example:</strong></p>
<ul>
<li>Non-trivial — 7 invocation modes, argument parsing, doc persistence</li>
<li>Uses <strong>every</strong> frontmatter field you'd care about</li>
<li>Uses a <strong>5-layer teaching framework</strong> — the skill body is a prompt-as-code artifact</li>
<li>Persists results — each lesson is appended to <code>~/.claude/skills/tutor/docs/&lt;domain&gt;.md</code></li>
</ul>
<p><strong>Full source in the <code>bonus-skills/</code> folder of this repo.</strong> Drop it into your own <code>~/.claude/skills/tutor/</code> to use it.</p>

<h2 id="tutor--the-body-design"><code>/tutor</code> — the body design</h2>
<p>The body <em>is</em> the system prompt appended when invoked. Four design choices worth stealing:</p>
<ol>
<li><strong>Flags compose</strong> — <code>/tutor --socratic --debug &quot;topic&quot;</code>. One skill + flags beats 7 skills.</li>
<li><strong>Named framework (5 layers)</strong> — Situation → Mechanism → Principle → Adjacent → Pattern Recognition. Predictable shape; easy for the model to obey.</li>
<li><strong>Default vs <code>--deep</code></strong> — ships layers 1–3, offers to expand. Respects time; opt-in depth.</li>
<li><strong>Persistence</strong> — writes lessons to <code>~/.claude/skills/tutor/docs/&lt;domain&gt;.md</code> + updates <code>index.md</code>. Compounds into a personal knowledge base.</li>
</ol>
</section>

<h2 id="the-5-layer-framework-why-it-works">The 5-layer framework (why it works)</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Layer 1 — Situation     [ground in the concrete problem from context]
Layer 2 — Mechanism     [how it works, Mermaid diagram if useful]
Layer 3 — Principle     [name the rule, explain why it exists]
Layer 4 — Adjacent      [2-3 related concepts to round out the mental model]
Layer 5 — Pattern       [&quot;when you see X, check for Y, because Z&quot;]
</code></pre>
<p><strong>Why layered:</strong> teaching collapses without structure. Without layer 1, lessons feel abstract. Without layer 3, they feel like trivia. Without layer 5, they don't <em>generalize</em> — the learner solves this bug but can't spot the class of bug.</p>
<p><strong>The takeaway for YOUR skills:</strong> give your skill a <em>named framework</em> its body enforces. A skill without structure is just a long prompt; a skill with structure is a reliable tool.</p>
</section>

<h2 id="persistence-pattern-steal-this">Persistence pattern (steal this)</h2>
<p>Every non-review lesson, <code>/tutor</code>:</p>
<ol>
<li><strong>Classifies</strong> the domain (<code>python</code>, <code>databases</code>, <code>architecture</code>, ...)</li>
<li><strong>Reads</strong> the existing topic file if it exists</li>
<li><strong>Appends</strong> a new lesson (or adds an example to an existing one)</li>
<li><strong>Updates</strong> <code>docs/index.md</code> with the lesson title + date</li>
<li><strong>Cross-references</strong> related lessons in other domains</li>
</ol>
<p>Result: a growing, self-organizing personal knowledge base. Fully markdown. Renders in GitHub/Obsidian/VS Code.</p>
<p><strong>Apply this to:</strong> <code>/commit-ready</code> (log commit patterns), <code>/incident</code> (persist RCAs), <code>/onboard-repo</code> (build a growing project guide). Any skill whose output <em>accumulates</em> should persist.</p>
</section>

<h2 id="composition--skill--subagent--hook">Composition — skill + subagent + hook</h2>
<p>Extending <code>/tutor</code> into a full pipeline with <code>/tutor --research &quot;topic&quot;</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  ┌─────────────────────┐
  │ /tutor --research   │
  └──────────┬──────────┘
             ▼
  ┌─────────────────────┐   Subagent — own context,
  │ tutor-researcher    │   scoped tools, returns
  │ (sources + prior    │   structured findings
  │  art + citations)   │
  └──────────┬──────────┘
             ▼
  ┌─────────────────────┐   Skill body — synthesizes
  │ /tutor teaches with │   the 5-layer lesson WITH
  │ inline citations    │   inline refs + bibliography
  └──────────┬──────────┘
             ▼
  ┌─────────────────────┐   Hook — PostToolUse fires
  │ &quot;lesson saved&quot;      │   when the lesson is persisted
  │ notification        │   (filter by content marker)
  └─────────────────────┘
</code></pre>
<p>Subagent keeps research out of main context. Skill enforces structure + citations. Hook makes it observable.</p>
</section>

<h2 id="the-research-subagent-anatomy">The research subagent (anatomy)</h2>
<p><code>~/.claude/agents/tutor-researcher.md</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">name:</span> <span class="hljs-string">tutor-researcher</span>
<span class="hljs-attr">description:</span> <span class="hljs-string">Deep-research</span> <span class="hljs-string">companion</span> <span class="hljs-string">for</span> <span class="hljs-string">/tutor.</span> <span class="hljs-string">Gathers</span> <span class="hljs-string">sources</span> <span class="hljs-string">+</span> <span class="hljs-string">surfaces</span>
  <span class="hljs-string">prior</span> <span class="hljs-string">lessons;</span> <span class="hljs-string">returns</span> <span class="hljs-string">structured</span> <span class="hljs-string">findings</span> <span class="hljs-string">with</span> <span class="hljs-string">citations.</span>
<span class="hljs-attr">tools:</span> <span class="hljs-string">WebSearch,</span> <span class="hljs-string">WebFetch,</span> <span class="hljs-string">Read,</span> <span class="hljs-string">Grep,</span> <span class="hljs-string">Glob</span>
<span class="hljs-meta">---
</span></code></pre>
<p><strong>Why a subagent and not just more prompt?</strong> Subagents run in their own <strong>isolated context window</strong> with a <strong>scoped tool budget</strong>. Web-search noise, half-read pages, and dead-end queries stay out of the main conversation — only the distilled findings come back. Reach for one when a task has a clear input/output contract, benefits from depth, and would otherwise pollute context you need to keep lean.</p>
</section>

<h2 id="the-completion-hook">The completion hook</h2>
<p>In <code>~/.claude/settings.json</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;hooks&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;PostToolUse&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-punctuation">{</span>
      <span class="hljs-attr">&quot;matcher&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;Write&quot;</span><span class="hljs-punctuation">,</span>
      <span class="hljs-attr">&quot;hooks&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-punctuation">{</span>
        <span class="hljs-attr">&quot;type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;command&quot;</span><span class="hljs-punctuation">,</span>
        <span class="hljs-attr">&quot;command&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;jq -r &#x27;.tool_input.file_path&#x27; | grep -q &#x27;/\\.claude/skills/tutor/docs/&#x27; &amp;&amp; osascript -e &#x27;display notification \&quot;Lesson saved\&quot; with title \&quot;/tutor\&quot;&#x27;&quot;</span>
      <span class="hljs-punctuation">}</span><span class="hljs-punctuation">]</span>
    <span class="hljs-punctuation">}</span><span class="hljs-punctuation">]</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<ul>
<li>Fires after every <code>Write</code> — hooks read a JSON payload from <strong>stdin</strong> (<code>tool_name</code>, <code>tool_input</code>, <code>session_id</code>).</li>
<li><code>jq</code> pulls the path; <code>grep -q</code> filters to tutor docs only. Non-match = silent exit.</li>
<li>macOS <code>osascript</code>; swap for <code>notify-send</code> (Linux) or <code>curl</code> → Slack webhook.</li>
</ul>
<p><strong><img class="emoji" draggable="false" alt="▶" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/25b6.svg" data-marp-twemoji=""/> DEMO</strong> · Paste the snippet into <code>~/.claude/settings.json</code>, restart Claude, run <code>/tutor &quot;why CSS specificity cascades&quot;</code>. When the lesson persists, the notification fires — deterministic, model-independent.</p>
<p><strong>Lesson:</strong> hooks make skill output <strong>observable</strong>. You always know when something ran.</p>
